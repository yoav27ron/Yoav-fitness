<script>
  // Migration from v1 (Firebase push) to v2 — unregister any stale service worker
  // and clear caches so returning visitors get the fresh build.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then((regs) => {
      regs.forEach((r) => r.unregister());
    }).catch(() => {});
  }
  if ('caches' in window) {
    caches.keys().then((keys) => keys.forEach((k) => caches.delete(k))).catch(() => {});
  }
</script>

function V2Ring({ size = 64, stroke = 5, value = 0.5, color = YLV2_Tokens.amber, track = 'rgba(233,235,230,0.09)', children }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r} stroke={track} strokeWidth={stroke} fill="none"/>
        <circle cx={size/2} cy={size/2} r={r} stroke={color} strokeWidth={stroke} fill="none"
                strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c * (1 - value)}/>
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'grid', placeItems: 'center' }}>{children}</div>
    </div>
  );
}

        </div>
        <div style={{ fontFamily: rtl ? YLV2_Type.heb : YLV2_Type.serif, fontSize: 30, color: YLV2_Tokens.cream, letterSpacing: -0.5, marginTop: 6, lineHeight: 1.05 }}>
          {t.askAnything}
        </div>
      </div>

      <div style={{ padding: '0 16px 12px' }}>
        <V2Card pad={14} dark>
          <div style={{ fontFamily: YLV2_Type.mono, fontSize: 9.5, color: YLV2_Tokens.creamMute, letterSpacing: 1, textTransform: 'uppercase', marginBottom: 8 }}>
            {rtl ? 'מה שאני יודע עליך' : 'What I know about you'}
          </div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {(rtl ? [
              'סוף שבוע קשה', 'נשנוש בעבודה', 'ראשון = טריגר',
              'אוהב חלבון בבוקר', 'לא עגבניות', 'מתאמן יותר בערב',
              'מתייבש כשזה לחוץ',
            ] : [
              'tough weekends', 'snacks at work', 'Sundays = trigger',
              'protein breakfast fan', 'no tomatoes', 'evening trainer',

      <div style={{ padding: '0 16px', display: 'flex', flexDirection: 'column', gap: 8 }}>

              padding: '12px 14px', borderRadius: 16,

        <div style={{
          background: YLV2_Tokens.inkSoft, borderRadius: 999,
          border: `1px solid ${YLV2_Tokens.creamHair}`,
          display: 'flex', alignItems: 'center', padding: '6px',

          <button style={{
            width: 38, height: 38, borderRadius: 19, border: 'none',

              flex: 1, border: 'none', outline: 'none', background: 'transparent',

}

function V2TabBar({ tab, setTab, t, L }) {
  const rtl = L.dir === 'rtl';
  const items = [
    { k: 'today', icon: 'today', label: t.today },
    { k: 'food',  icon: 'food',  label: t.food },
    { k: 'train', icon: 'train', label: t.train },
    { k: 'prog',  icon: 'prog',  label: t.progress },
    { k: 'ai',    icon: 'ai',    label: t.ai },
  ];
  return (
    <div style={{
      position: 'fixed',
      bottom: 'calc(env(safe-area-inset-bottom) + 14px)',
      left: 12, right: 12,
      zIndex: 45,
      direction: L.dir,
      pointerEvents: 'none',
      maxWidth: 456, marginLeft: 'auto', marginRight: 'auto',
    }}>
      <div style={{
        pointerEvents: 'auto',
        background: 'rgba(17,38,38,0.82)',
        backdropFilter: 'blur(22px) saturate(180%)',
        WebkitBackdropFilter: 'blur(22px) saturate(180%)',
        borderRadius: 28,
        padding: '10px 6px',
        display: 'flex', justifyContent: 'space-between',
        border: `1px solid rgba(233,235,230,0.14)`,
        boxShadow: '0 10px 30px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(188,255,0,0.06), inset 0 1px 0 rgba(255,255,255,0.04)',
      }}>
        {items.map(it => {
          const active = tab === it.k;
          return (
            <button key={it.k} onClick={() => setTab(it.k)} style={{
              flex: 1, border: 'none', background: active ? YLV2_Tokens.amber : 'transparent',
              color: active ? YLV2_Tokens.ink : YLV2_Tokens.creamDim,
              borderRadius: 20, padding: '8px 4px', cursor: 'pointer',
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
              fontFamily: rtl ? YLV2_Type.hebSans : YLV2_Type.sans,
              fontSize: 10.5, fontWeight: 600,
              transition: 'background 0.15s, color 0.15s',
            }}>
              <V2Icon name={it.icon} size={20}/>
              <span>{it.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────
   Settings screen
   ────────────────────────────────────────────────────────────── */
function SettingsSection({ label, icon, children }) {
  return (
    <div style={{ marginBottom: 22 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10, padding: '0 6px' }}>
        <V2Icon name={icon} size={14} color={YLV2_Tokens.amber}/>
        <span style={{ fontFamily: YLV2_Type.mono, fontSize: 10, color: YLV2_Tokens.amber, letterSpacing: 1.2, textTransform: 'uppercase', fontWeight: 600 }}>
          {label}
        </span>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>{children}</div>
    </div>
  );
}

function SettingsToggle({ label, sub, defaultOn = false }) {
  const [on, setOn] = React.useState(defaultOn);
  return (
    <div style={{
      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      padding: '14px 16px', borderRadius: 14,
      background: YLV2_Tokens.inkSoft,
      border: `1px solid ${YLV2_Tokens.creamHair}`,
    }}>
      <div style={{ flex: 1 }}>
        <div style={{ color: YLV2_Tokens.cream, fontSize: 14, fontWeight: 500 }}>{label}</div>
        {sub && <div style={{ color: YLV2_Tokens.creamMute, fontSize: 11, marginTop: 2 }}>{sub}</div>}
      </div>
      <button onClick={() => setOn(!on)} style={{
        width: 46, height: 26, borderRadius: 13,
        background: on ? YLV2_Tokens.amber : 'rgba(233,235,230,0.14)',
        border: 'none', cursor: 'pointer', position: 'relative', flexShrink: 0,
        transition: 'background 0.2s',
      }}>
        <div style={{
          position: 'absolute', top: 3, left: on ? 23 : 3,
          width: 20, height: 20, borderRadius: 10,
          background: on ? YLV2_Tokens.ink : YLV2_Tokens.cream,
          transition: 'left 0.2s',
        }}/>
      </button>
    </div>
  );
}

function SettingsRow({ label, value, danger, onClick }) {
  return (
    <button onClick={onClick} style={{
      display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12,
      padding: '14px 16px', borderRadius: 14, width: '100%',
      background: YLV2_Tokens.inkSoft,
      border: `1px solid ${danger ? 'rgba(229,107,90,0.3)' : YLV2_Tokens.creamHair}`,
      color: danger ? YLV2_Tokens.blood : YLV2_Tokens.cream,
      fontSize: 14, fontWeight: 500, cursor: 'pointer', textAlign: 'inherit',
      fontFamily: 'inherit',
    }}>
      <span>{label}</span>
      {value && <span style={{ color: YLV2_Tokens.creamMute, fontFamily: YLV2_Type.mono, fontSize: 11 }}>{value}</span>}
    </button>
  );
}

  return (
    <div style={{
      position: 'fixed', inset: 0, background: YLV2_Tokens.ink, zIndex: 65,

    }}>
      <div style={{
        padding: 'calc(env(safe-area-inset-top) + 14px) 22px 10px',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      }}>
        <button onClick={close} style={{
          width: 38, height: 38, borderRadius: 19,
          border: `1px solid ${YLV2_Tokens.creamHair}`,

          display: 'grid', placeItems: 'center',
        }}><V2Icon name="x" size={16}/></button>
        <span style={{ fontFamily: YLV2_Type.mono, fontSize: 10, color: YLV2_Tokens.creamMute, letterSpacing: 2, textTransform: 'uppercase' }}>

        </span>

      </div>

      <div style={{ padding: '0 22px 8px' }}>

          {rtl ? <>הגדרות.<br/><em style={{color: YLV2_Tokens.amber}}>שלך.</em></> : <>Settings.<br/><em style={{color: YLV2_Tokens.amber}}>Yours.</em></>}
        </div>
        <div style={{ fontFamily: rtl ? YLV2_Type.hebSans : YLV2_Type.sans, fontSize: 13, color: YLV2_Tokens.creamDim, marginTop: 8 }}>
          {rtl ? 'שולט בכל. בלי פשרות.' : 'Full control. Zero compromise.'}
        </div>
      </div>

      <div style={{ padding: '20px 16px calc(env(safe-area-inset-bottom) + 140px)' }}>

        <SettingsSection label={rtl ? 'שפה' : 'Language'} icon="globe">
          <div style={{ display: 'flex', gap: 8 }}>
            {[['he', 'עברית'], ['en', 'English']].map(([k, l]) => (
              <button key={k} onClick={() => setLang(k)} style={{
                flex: 1, padding: '14px', borderRadius: 14,
                border: `1px solid ${lang === k ? YLV2_Tokens.amber : YLV2_Tokens.creamHair}`,
                background: lang === k ? YLV2_Tokens.amber : YLV2_Tokens.inkSoft,

        <SettingsSection label={rtl ? 'פרופיל' : 'Profile'} icon="user">
          <SettingsRow label={rtl ? 'שם' : 'Name'} value="Yoav"/>
          <SettingsRow label={rtl ? 'משקל נוכחי' : 'Current weight'} value="93.2 kg"/>
          <SettingsRow label={rtl ? 'יעד' : 'Target'} value="80 kg"/>
        </SettingsSection>

        <SettingsSection label={rtl ? 'מצב ברירת מחדל' : 'Default day mode'} icon="clock">
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {t.modes.map(m => (
              <button key={m.k} onClick={() => setMode(m.k)} style={{
                padding: '9px 13px', borderRadius: 999,

        <SettingsSection label={rtl ? 'התראות' : 'Notifications'} icon="bell">
          <SettingsToggle label={rtl ? 'התראות חכמות' : 'Smart notifications'} sub={rtl ? 'רק מה שחשוב' : 'only what matters'} defaultOn/>
          <SettingsToggle label={rtl ? 'רגעים רגישים' : 'Sensitive moments'} sub={rtl ? 'לפני הנקודות שאתה נשבר בהן' : 'before your known trigger windows'} defaultOn/>
          <SettingsToggle label={rtl ? 'רטט' : 'Haptics'} defaultOn/>
          <SettingsToggle label={rtl ? 'שקט 22:00–07:00' : 'Quiet 22:00–07:00'} defaultOn/>
        </SettingsSection>

        <SettingsSection label={rtl ? 'תזכורות' : 'Reminders'} icon="clock">
          <SettingsToggle label={rtl ? 'מים — כוס לפני כל ארוחה' : 'Water before each meal'} defaultOn/>
          <SettingsToggle label={rtl ? 'צ׳ק-אין בוקר' : 'Morning check-in'} sub="07:00" defaultOn/>
          <SettingsToggle label={rtl ? 'הליכה צהריים' : 'Midday walk'} defaultOn={false}/>
        </SettingsSection>

        <SettingsSection label={rtl ? 'נתונים' : 'Data'} icon="shield">
          <SettingsRow label={rtl ? 'ייצוא נתונים' : 'Export data'}/>
          <SettingsRow label={rtl ? 'סנכרון עם Apple Health' : 'Sync with Apple Health'}/>
          <SettingsRow label={rtl ? 'סנכרון עם Google Fit' : 'Sync with Google Fit'}/>
          <SettingsRow label={rtl ? 'איפוס צ׳ק-אין היום' : 'Reset today\'s check-in'}/>
          <SettingsRow label={rtl ? 'מחיקת כל הנתונים' : 'Delete all data'} danger/>
        </SettingsSection>

        <SettingsSection label={rtl ? 'על המערכת' : 'About'} icon="brain">
          <div style={{
            padding: '16px 18px', borderRadius: 14,
            background: YLV2_Tokens.inkSoft, border: `1px solid ${YLV2_Tokens.creamHair}`,
          }}>
            <div style={{ fontFamily: rtl ? YLV2_Type.heb : YLV2_Type.serif, fontSize: 22, color: YLV2_Tokens.cream, lineHeight: 1.1 }}>
              YOAV LIFE <em style={{ color: YLV2_Tokens.amber }}>v2</em>
            </div>
            <div style={{ fontFamily: YLV2_Type.mono, fontSize: 10, color: YLV2_Tokens.creamMute, letterSpacing: 0.8, marginTop: 6 }}>
              Personal OS · Build 2.0.0
            </div>
            <div style={{ fontFamily: rtl ? YLV2_Type.hebSans : YLV2_Type.sans, fontSize: 12.5, color: YLV2_Tokens.creamDim, marginTop: 12, lineHeight: 1.5 }}>
              {rtl
                ? 'מערכת הפעלה אישית לגבר עצמאי. הגוף, האנרגיה, הפוקוס והעסק — מערכת אחת, לא ארבע נפרדות.'
                : 'A private operating system for a self-employed man. Body, energy, focus and business — one system, not four separate apps.'}
            </div>
          </div>
          <SettingsRow label={rtl ? 'תנאי שימוש' : 'Terms'}/>
          <SettingsRow label={rtl ? 'פרטיות' : 'Privacy'}/>
          <SettingsRow label={rtl ? 'צור קשר' : 'Contact'}/>
        </SettingsSection>

      </div>
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────
   App shell — wires screens + overlays + language
   ────────────────────────────────────────────────────────────── */
function App() {
  const [lang, setLang] = React.useState('he');
  const L = YLV2_STRINGS[lang];
  const t = L;

  const [tab, setTab] = React.useState('today');
  const [mode, setMode] = React.useState('meetings');
  const [state, setState] = React.useState({ checkedIn: true });
  const [overlay, setOverlay] = React.useState(null); // 'sos' | 'notifs' | 'modes' | 'settings' | null

  // Keep <html> dir/lang in sync so RTL is honored natively by the browser
  React.useEffect(() => {
    document.documentElement.setAttribute('dir', L.dir);
    document.documentElement.setAttribute('lang', lang);
  }, [lang, L.dir]);

  const screen = (() => {
    switch (tab) {
      case 'today': return <V2Today t={t} L={L} state={state} setState={setState}
                              openSOS={() => setOverlay('sos')} openNotifs={() => setOverlay('notifs')}
                              openMode={() => setOverlay('modes')} mode={mode}/>;
      case 'food':  return <V2Food  t={t} L={L}/>;
      case 'train': return <V2Train t={t} L={L}/>;
      case 'prog':  return <V2Progress t={t} L={L}/>;
      case 'ai':    return <V2AI t={t} L={L}/>;
      default: return null;
    }
  })();

  const rtl = L.dir === 'rtl';

  return (
    <div style={{
      position: 'relative', minHeight: '100dvh',
      background: YLV2_Tokens.ink, color: YLV2_Tokens.cream,
      direction: L.dir, overflow: 'hidden',
    }}>
      {/* Floating controls pill — settings + language, always accessible */}
      <div style={{
        position: 'fixed', zIndex: 50,
        top: 'calc(env(safe-area-inset-top) + 10px)',
        [rtl ? 'left' : 'right']: 12,
        display: 'flex', gap: 6, direction: 'ltr',
      }}>
        <button onClick={() => setOverlay('settings')} aria-label="Settings" style={{
          width: 36, height: 36, borderRadius: 18,
          background: 'rgba(17,38,38,0.72)',
          backdropFilter: 'blur(14px) saturate(180%)',
          WebkitBackdropFilter: 'blur(14px) saturate(180%)',
          border: `1px solid rgba(233,235,230,0.16)`,
          color: YLV2_Tokens.cream, cursor: 'pointer',
          display: 'grid', placeItems: 'center',
        }}>
          <V2Icon name="cog" size={16}/>
        </button>
        <button onClick={() => setLang(lang === 'he' ? 'en' : 'he')} aria-label="Language" style={{
          minWidth: 40, height: 36, borderRadius: 18,
          padding: '0 12px',
          background: 'rgba(188,255,0,0.14)', color: YLV2_Tokens.amber,
          backdropFilter: 'blur(14px) saturate(180%)',
          WebkitBackdropFilter: 'blur(14px) saturate(180%)',
          border: `1px solid ${YLV2_Tokens.amber}`, cursor: 'pointer',
          fontFamily: YLV2_Type.mono, fontSize: 10, fontWeight: 700, letterSpacing: 1.2,
        }}>{lang === 'he' ? 'EN' : 'עב'}</button>
      </div>

      {/* Active screen */}
      {screen}

      {/* Floating bottom tab bar */}
      <V2TabBar tab={tab} setTab={setTab} t={t} L={L}/>

      {/* Overlays */}
      {overlay === 'sos'      && <V2SOS t={t} L={L} close={() => setOverlay(null)}/>}
      {overlay === 'notifs'   && <V2Notifications t={t} L={L} close={() => setOverlay(null)}/>}
      {overlay === 'modes'    && <V2ModePicker t={t} L={L} active={mode} setActive={setMode} onClose={() => setOverlay(null)}/>}
      {overlay === 'settings' && <V2Settings t={t} L={L} lang={lang} setLang={setLang} mode={mode} setMode={setMode} close={() => setOverlay(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
