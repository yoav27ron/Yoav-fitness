<script>
  // Migration from v1 (Firebase push) to v2 — unregister any stale service worker
  // and clear caches so returning visitors get the fresh build.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then((regs) => {
      regs.forEach((r) => r.unregister());
    }).catch(() => {});
  }
  if ('caches' in window) {
    caches.keys().then((keys) => keys.forEach((k) => caches.delete(k))).catch(() => {});
  }
</script>

/* ──────────────────────────────────────────────────────────────
   Data layer — localStorage store + React context + derived stats
   ────────────────────────────────────────────────────────────── */
const STORAGE_KEY = 'yoav_life_v2_data';
const EMPTY_DATA = {
  version: 2,
  profile: null,   // { name, startWeight, targetWeight, startDate, height, age }
  mode: 'workday',
  lang: 'he',
  weights: [],     // [{ date: ISO, kg: number }]
  meals: [],       // [{ date: ISO, name, kcal, protein, slot }]
  workouts: [],    // [{ date: ISO, type, minutes, notes? }]
  water: [],       // [{ date: ISO }]
  checkIns: [],    // [{ date: ISO, energy, mood, sore, sleep, stress, cravings, time }]
  dislikes: [],    // string[] — ingredients the user avoids
  apiKey: '',      // Claude API key (user-supplied, stays in localStorage)
  journal: [],     // [{ date: ISO, text, analysis? }]
  googleFit: null, // { accessToken, expiresAt, clientId }
  googleCal: null, // same shape
};

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { ...EMPTY_DATA };
    return { ...EMPTY_DATA, ...JSON.parse(raw) };
  } catch (e) { return { ...EMPTY_DATA }; }
}
function saveData(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch (e) {} }
function clearData() { try { localStorage.removeItem(STORAGE_KEY); } catch (e) {} }

const StoreContext = React.createContext(null);
function useStore() { return React.useContext(StoreContext); }

function StoreProvider({ children }) {
  const [data, setData] = React.useState(loadData);
  React.useEffect(() => { saveData(data); }, [data]);

  const api = React.useMemo(() => ({
    data,
    setProfile: (patch) => setData(d => ({ ...d, profile: { ...(d.profile || {}), ...patch } })),
    setMode:    (mode)  => setData(d => ({ ...d, mode })),
    setLang:    (lang)  => setData(d => ({ ...d, lang })),
    addWeight:  (kg, noteDate) => setData(d => ({ ...d, weights: [...d.weights, { date: (noteDate || new Date().toISOString()), kg: +kg }] })),
    addMeal:    (m)     => setData(d => ({ ...d, meals: [...d.meals, { date: new Date().toISOString(), ...m }] })),
    delMeal:    (idx)   => setData(d => ({ ...d, meals: d.meals.filter((_, i) => i !== idx) })),
    addWorkout: (w)     => setData(d => ({ ...d, workouts: [...d.workouts, { date: new Date().toISOString(), ...w }] })),
    delWorkout: (idx)   => setData(d => ({ ...d, workouts: d.workouts.filter((_, i) => i !== idx) })),
    addWater:   ()      => setData(d => ({ ...d, water: [...d.water, { date: new Date().toISOString() }] })),
    removeWater: ()     => setData(d => ({ ...d, water: d.water.slice(0, -1) })),
    saveCheckIn: (c)    => setData(d => ({ ...d, checkIns: [...d.checkIns.filter(x => x.date.slice(0,10) !== new Date().toISOString().slice(0,10)), { date: new Date().toISOString(), ...c }] })),
    addDislike: (s)     => setData(d => { const v = (s||'').trim(); if (!v || (d.dislikes||[]).includes(v)) return d; return { ...d, dislikes: [...(d.dislikes||[]), v] }; }),
    removeDislike: (s)  => setData(d => ({ ...d, dislikes: (d.dislikes||[]).filter(x => x !== s) })),
    setApiKey: (k)      => setData(d => ({ ...d, apiKey: (k||'').trim() })),
    addJournal: (text)  => setData(d => ({ ...d, journal: [...(d.journal||[]), { date: new Date().toISOString(), text }] })),
    setJournalAnalysis: (idx, analysis) => setData(d => ({ ...d, journal: (d.journal||[]).map((j, i) => i === idx ? { ...j, analysis } : j) })),
    delJournal: (idx)   => setData(d => ({ ...d, journal: (d.journal||[]).filter((_, i) => i !== idx) })),
    setGoogleFit: (obj) => setData(d => ({ ...d, googleFit: obj })),
    setGoogleCal: (obj) => setData(d => ({ ...d, googleCal: obj })),
    resetAll:   ()      => { clearData(); setData({ ...EMPTY_DATA }); },
    exportJSON: ()      => JSON.stringify(data, null, 2),
  }), [data]);

  return <StoreContext.Provider value={api}>{children}</StoreContext.Provider>;
}

function todayKey() { return new Date().toISOString().slice(0, 10); }
function isSameDay(iso) { return iso && iso.slice(0, 10) === todayKey(); }
function isThisWeek(iso) {
  if (!iso) return false;
  const now = new Date(); const then = new Date(iso);
  const diff = (now - then) / 86400000;
  return diff >= 0 && diff < 7;
}
function fmtDateHe(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit' });
}
function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function deriveStats(data) {
  const { profile, weights, meals, workouts, checkIns, water } = data;
  const todaysMeals    = meals.filter(m => isSameDay(m.date));
  const todaysWorkouts = workouts.filter(w => isSameDay(w.date));
  const todaysWater    = water.filter(w => isSameDay(w.date)).length;
  const todaysKcal     = todaysMeals.reduce((a, m) => a + (+m.kcal || 0), 0);
  const todaysProtein  = todaysMeals.reduce((a, m) => a + (+m.protein || 0), 0);

  const startWeight  = (profile && profile.startWeight) || (weights[0] && weights[0].kg) || null;
  const targetWeight = (profile && profile.targetWeight) || null;
  const latestWeight = weights.length ? weights[weights.length - 1].kg : startWeight;

  const delta       = (startWeight != null && latestWeight != null) ? (startWeight - latestWeight) : 0;
  const totalToLose = (startWeight != null && targetWeight != null) ? (startWeight - targetWeight) : 0;
  const progressPct = totalToLose > 0 ? Math.max(0, Math.min(1, delta / totalToLose)) : 0;

  const startDate = profile && profile.startDate;
  const dayCount  = startDate ? Math.max(1, Math.floor((Date.now() - new Date(startDate).getTime()) / 86400000) + 1) : 1;
  const planDays  = (profile && profile.planDays) || 168;

  // Streak: consecutive days from today backwards with any activity
  const hasActivity = (dayIso) => {
    const key = dayIso.slice(0, 10);
    return weights.some(w => w.date.slice(0,10) === key)
        || meals.some(m => m.date.slice(0,10) === key)
        || workouts.some(w => w.date.slice(0,10) === key)
        || water.some(w => w.date.slice(0,10) === key)
        || checkIns.some(c => c.date.slice(0,10) === key);
  };
  let streak = 0;
  const d = new Date();
  while (hasActivity(d.toISOString()) && streak < 365) { streak++; d.setDate(d.getDate() - 1); }

  // Averages across last 7 logged days
  const last7 = new Array(7).fill(0).map((_, i) => { const x = new Date(); x.setDate(x.getDate() - i); return x.toISOString().slice(0,10); });
  const proteinPerDay = last7.map(k => meals.filter(m => m.date.slice(0,10) === k).reduce((a, m) => a + (+m.protein || 0), 0));
  const avgProtein = Math.round(proteinPerDay.reduce((a,b) => a+b, 0) / 7);
  const waterPerDay = last7.map(k => water.filter(w => w.date.slice(0,10) === k).length);
  const avgWater = (waterPerDay.reduce((a,b)=>a+b,0) / 7).toFixed(1);

  const sessions = workouts.length;
  const targetSessions = Math.max(20, Math.ceil(dayCount / 7) * 4); // ~4 per week goal

  const todayCheckIn = checkIns.find(c => isSameDay(c.date));
  const didCheckInToday = !!todayCheckIn;

  return {
    todaysMeals, todaysWorkouts, todaysWater, todaysKcal, todaysProtein,
    startWeight, targetWeight, latestWeight, delta, totalToLose, progressPct,
    dayCount, planDays, streak, avgProtein, avgWater, sessions, targetSessions,
    todayCheckIn, didCheckInToday,
    weights,
  };
}

function V2CheckIn({ t, L, onDone, rtl }) {
  const [vals, setVals] = React.useState({ energy: 3, mood: 3, sore: 2, time: 40, sleep: 3, stress: 3, cravings: 2 });
  const row = (k, label, max = 5) => (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
        <span style={{ fontFamily: rtl ? YLV2_Type.hebSans : YLV2_Type.sans, fontSize: 14, color: YLV2_Tokens.cream, fontWeight: 500 }}>{label}</span>
        <span style={{ fontFamily: YLV2_Type.mono, fontSize: 11, color: YLV2_Tokens.amber }}>{vals[k]}{k === 'time' ? ' min' : `/${max}`}</span>
      </div>
      <div style={{ display: 'flex', gap: 4, marginTop: 8 }}>
        {Array.from({length: max}).map((_, i) => (
          <button key={i} onClick={() => setVals({ ...vals, [k]: i+1 })} style={{
            flex: 1, height: 30, borderRadius: 6, border: 'none',
            background: (i+1) <= vals[k] ? YLV2_Tokens.amber : 'rgba(233,235,230,0.06)',
            cursor: 'pointer',
          }}/>
        ))}
      </div>
    </div>
  );

  return (
    <div style={{ padding: 'calc(env(safe-area-inset-top) + 64px) 22px calc(env(safe-area-inset-bottom) + 40px)', direction: L.dir }}>
      <div style={{ fontFamily: YLV2_Type.mono, fontSize: 10.5, color: YLV2_Tokens.amber, letterSpacing: 1.5, textTransform: 'uppercase' }}>
        {t.checkIn}
      </div>
      <div style={{ fontFamily: rtl ? YLV2_Type.heb : YLV2_Type.serif, fontSize: 30, color: YLV2_Tokens.cream, lineHeight: 1.05, letterSpacing: -0.4, marginTop: 8 }}>
        {rtl ? 'איך אתה באמת?' : <>How are you,<br/><em style={{ color: YLV2_Tokens.amber }}>really?</em></>}
      </div>
      <div style={{ fontFamily: rtl ? YLV2_Type.hebSans : YLV2_Type.sans, fontSize: 13, color: YLV2_Tokens.creamDim, marginTop: 8, lineHeight: 1.4 }}>
        {rtl ? '30 שניות. היום ייבנה סביב התשובות.' : '30 seconds. Today is built around your answers.'}
      </div>

      <div style={{ marginTop: 24, display: 'flex', flexDirection: 'column', gap: 18 }}>
        {row('energy',   t.energy)}
        {row('mood',     t.mood)}
        {row('sore',     t.sore)}
        {row('sleep',    t.sleep)}
        {row('stress',   t.stress)}
        {row('cravings', t.cravings)}
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
            <span style={{ fontFamily: rtl ? YLV2_Type.hebSans : YLV2_Type.sans, fontSize: 14, color: YLV2_Tokens.cream, fontWeight: 500 }}>{t.timeToday}</span>
            <span style={{ fontFamily: YLV2_Type.mono, fontSize: 11, color: YLV2_Tokens.amber }}>{vals.time} {t.min}</span>
          </div>
          <div style={{ display: 'flex', gap: 4, marginTop: 8 }}>
            {[15, 25, 40, 60, 90].map(n => (
              <button key={n} onClick={() => setVals({ ...vals, time: n })} style={{
                flex: 1, padding: '10px 0', borderRadius: 8, border: 'none',
                background: vals.time === n ? YLV2_Tokens.amber : 'rgba(233,235,230,0.06)',
                color: vals.time === n ? YLV2_Tokens.ink : YLV2_Tokens.cream,
                fontFamily: YLV2_Type.mono, fontSize: 11, fontWeight: 600, cursor: 'pointer',
              }}>{n}m</button>
            ))}
          </div>
        </div>
      </div>

      <button onClick={() => onDone(vals)} style={{
        width: '100%', padding: '16px', borderRadius: 999, border: 'none', marginTop: 28,
        background: YLV2_Tokens.cream, color: YLV2_Tokens.ink, cursor: 'pointer',
        fontFamily: rtl ? YLV2_Type.hebSans : YLV2_Type.sans,
        fontSize: 14, fontWeight: 600, letterSpacing: 0.3,
      }}>{t.buildDay}</button>
    </div>
  );
}

function V2SOS({ t, L, close }) {
  const [stage, setStage] = React.useState('select');

  const rtl = L.dir === 'rtl';

  if (stage === 'plan') {
    const plans = {
      junk:  { title: rtl ? 'דקה. בוא נעצור.' : "One minute. Let's stop.",       sub: rtl ? 'החשק יעבור תוך 7 דקות. אני אתך.' : "This craving passes in 7 minutes. I'm with you." },
      binge: { title: rtl ? 'זה קרה. עכשיו חזרה.' : 'It happened. Now — back.',  sub: rtl ? 'בלי אשמה. התוכנית מתעדכנת עכשיו.' : 'No guilt. Plan is updating now.' },
      ruin:  { title: rtl ? 'היום לא נגמר.' : 'Today is not over.',              sub: rtl ? 'עוד 14 שעות. נבנה מחדש.' : '14 hours left. We rebuild.' },
      skip:  { title: rtl ? 'דלג — אבל לא תיעלם.' : "Skip — but don't vanish.",  sub: rtl ? '8 דקות תנועה עכשיו = הצלת היום.' : '8 min now = day saved.' },

      nomo:  { title: rtl ? 'שים לב — לא צריך מוטיבציה.' : "You don't need motivation.",       sub: rtl ? 'צריך פעולה אחת קטנה. בדיוק עכשיו.' : 'You need one small action. Right now.' },
      stress:{ title: rtl ? 'נשימה. ואז נמשיך.' : 'Breathe. Then we continue.',               sub: rtl ? '4 שאיפות · 6 נשיפות · 2 דקות.' : '4 in · 6 out · 2 min.' },
      quit:  { title: rtl ? 'אני לא אתן לך לעזוב.' : "I'm not letting you quit.",             sub: rtl ? 'ירדת כבר 3.8 ק״ג. זה לא סתם.' : "You're down 3.8 kg. That's not nothing." },

          display: 'grid', placeItems: 'center', alignSelf: rtl ? 'flex-end' : 'flex-start',
        }}><V2Icon name="x" size={16}/></button>
        <div style={{ fontFamily: YLV2_Type.mono, fontSize: 10, letterSpacing: 2, textTransform: 'uppercase', opacity: 0.65, marginTop: 20 }}>
          SOS · {(t.sosStates.find(s=>s.k===pick)||{}).label}
        </div>
        <div style={{ fontFamily: rtl ? YLV2_Type.heb : YLV2_Type.serif, fontSize: 40, lineHeight: 1, letterSpacing: -0.8, marginTop: 10 }}>
          {p.title}

        <div style={{ fontFamily: rtl ? YLV2_Type.hebSans : YLV2_Type.sans, fontSize: 15, marginTop: 16, opacity: 0.85, lineHeight: 1.4 }}>
          {p.sub}
        </div>

        <div style={{ marginTop: 28, display: 'flex', flexDirection: 'column', gap: 10 }}>
          {(pick === 'junk' ? [
            { n: '01', txt: rtl ? 'כוס מים גדולה — עכשיו'                 : 'Big glass of water — now' },
            { n: '02', txt: rtl ? 'יציאה של 3 דקות מהבית / החדר'          : 'Step out of the room for 3 min' },
            { n: '03', txt: rtl ? 'אם החשק נשאר — חטיף חלבון מאושר'     : 'Craving remains? Pre-approved protein snack' },
            { n: '04', txt: rtl ? 'רשום איפה היית ומה הרגשת'              : 'Log where you were, what you felt' },
          ] : [
            { n: '01', txt: rtl ? 'עצור. נשימה עמוקה אחת.'                : 'Stop. One deep breath.' },

            <div key={i} style={{

  const allowedRecipes = filterRecipes(RECIPES, store.data.dislikes || []);
  return (
    <div style={{ padding: 'calc(env(safe-area-inset-top) + 64px) 0 calc(env(safe-area-inset-bottom) + 120px)', direction: L.dir, color: YLV2_Tokens.cream }}>

function V2Progress({ t, L, stats, store }) {
  const rtl = L.dir === 'rtl';
  const weightStr = stats.latestWeight != null ? (+stats.latestWeight).toFixed(1) : '—';
  const weightSub = stats.delta > 0 ? `↓ ${stats.delta.toFixed(1)} ${t.kg}` : (stats.delta < 0 ? `↑ ${(-stats.delta).toFixed(1)} ${t.kg}` : (rtl ? 'נקודת התחלה' : 'start'));
  const consistencyPct = Math.round(stats.progressPct * 100);
  const sessions7d = store.data.workouts.filter(w => isThisWeek(w.date)).length;
  const tileStats = [
    { l: rtl ? 'משקל'        : 'Weight',       v: weightStr, s: weightSub, dark: true },
    { l: rtl ? 'התקדמות'     : 'To target',    v: `${consistencyPct}%`,  s: stats.targetWeight ? (rtl ? `עד ${stats.targetWeight} ${t.kg}` : `to ${stats.targetWeight} ${t.kg}`) : '—' },
    { l: rtl ? 'אימונים השבוע' : 'Sessions (wk)', v: `${sessions7d}` },
    { l: rtl ? 'רצף'          : 'Streak',       v: `${stats.streak}`,   s: rtl ? 'ימים' : 'days' },
    { l: rtl ? 'חלבון ממוצע'  : 'Avg protein',  v: `${stats.avgProtein}g`, s: rtl ? '7 ימים' : '7d avg' },
    { l: rtl ? 'מים'          : 'Water',        v: `${stats.avgWater}`, s: rtl ? 'כוסות/יום' : 'cups/day' },
    { l: rtl ? 'סה״כ אימונים' : 'All sessions', v: `${stats.sessions}` },
    { l: rtl ? 'יום'          : 'Day',          v: `${stats.dayCount}`, s: `/ ${stats.planDays}` },
  ];

  return (
    <div style={{ padding: 'calc(env(safe-area-inset-top) + 64px) 0 calc(env(safe-area-inset-bottom) + 120px)', direction: L.dir, color: YLV2_Tokens.cream }}>
      <div style={{ padding: '0 22px 14px' }}>
        <div style={{ fontFamily: YLV2_Type.mono, fontSize: 10.5, color: YLV2_Tokens.creamMute, letterSpacing: 1.5, textTransform: 'uppercase' }}>
          {stats.dayCount} / {stats.planDays} {rtl ? 'ימים' : 'days'}
        </div>
        <div style={{ fontFamily: rtl ? YLV2_Type.heb : YLV2_Type.serif, fontSize: 30, color: YLV2_Tokens.cream, letterSpacing: -0.5, marginTop: 6, lineHeight: 1.05 }}>
          {rtl ? <>זה קורה.<br/><em style={{ color: YLV2_Tokens.amber }}>באמת.</em></> : <>It's happening.<br/><em style={{ color: YLV2_Tokens.amber }}>For real.</em></>}
        </div>
      </div>

      <div style={{ padding: '0 16px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
        {tileStats.map((s,i) => (
          <V2Card key={i} pad={14} dark style={s.dark ? { background: YLV2_Tokens.amber, color: YLV2_Tokens.ink, border: 'none' } : {}}>
            <div style={{ fontFamily: YLV2_Type.mono, fontSize: 9.5, color: s.dark ? 'rgba(6,20,20,0.6)' : YLV2_Tokens.creamMute, letterSpacing: 1, textTransform: 'uppercase' }}>{s.l}</div>
            <div style={{ fontFamily: YLV2_Type.serif, fontSize: 28, color: s.dark ? YLV2_Tokens.ink : YLV2_Tokens.cream, lineHeight: 1, marginTop: 8, letterSpacing: -0.3 }}>
              {s.v}
            </div>
            {s.s && <div style={{ fontFamily: YLV2_Type.mono, fontSize: 10, color: s.dark ? 'rgba(6,20,20,0.65)' : YLV2_Tokens.amber, marginTop: 4 }}>{s.s}</div>}
          </V2Card>
        ))}
      </div>

      <div style={{ padding: '18px 16px' }}>
        <V2Card dark>
          <div style={{ fontFamily: YLV2_Type.mono, fontSize: 10, color: YLV2_Tokens.amber, letterSpacing: 1, textTransform: 'uppercase' }}>
            {rtl ? 'מה שאני רואה' : 'What I see'}

function ApiKeyEditor({ L, store }) {
  const rtl = L.dir === 'rtl';
  const [show, setShow] = React.useState(false);
  const [draft, setDraft] = React.useState(store.data.apiKey || '');
  const [status, setStatus] = React.useState('');
  const hasKey = !!store.data.apiKey;

  const save = () => { store.setApiKey(draft); setStatus(rtl ? 'נשמר' : 'Saved'); setTimeout(() => setStatus(''), 1500); };
  const test = async () => {
    setStatus(rtl ? 'בודק...' : 'Testing...');
    try {
      const reply = await callClaude({ apiKey: draft || store.data.apiKey, maxTokens: 50, messages: [{ role: 'user', content: rtl ? 'ענה במילה אחת: "עובד".' : 'Reply with one word: "working".' }] });
      setStatus('✓ ' + (reply || 'OK').slice(0, 40));
    } catch (e) { setStatus('✕ ' + String(e.message || e).slice(0, 80)); }
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      <div style={{ padding: 12, borderRadius: 12, background: YLV2_Tokens.inkSoft, border: `1px solid ${YLV2_Tokens.creamHair}`, fontFamily: rtl ? YLV2_Type.hebSans : YLV2_Type.sans, fontSize: 12, color: YLV2_Tokens.creamDim, lineHeight: 1.5 }}>

          ? 'המפתח נשמר רק בדפדפן שלך (localStorage). הוא לא עולה לשרת. ניתן לקבל מפתח ב-console.anthropic.com → API Keys. עלות משוערת: פחות מ-$0.003 לתמונה/בקשה עם Haiku.'
          : 'The key is stored only in your browser (localStorage). Get one at console.anthropic.com → API Keys. Typical cost: < $0.003 per request with Haiku.'}
      </div>
      <div style={{ display: 'flex', gap: 6 }}>
        <input type={show ? 'text' : 'password'} value={draft} onChange={e => setDraft(e.target.value)}
          placeholder="sk-ant-..." style={{ ...inputStyle(rtl), flex: 1, fontFamily: YLV2_Type.mono, fontSize: 12, direction: 'ltr', textAlign: 'left' }}/>
        <button onClick={() => setShow(s => !s)} style={{
          padding: '0 14px', borderRadius: 14, border: `1px solid ${YLV2_Tokens.creamHair}`,
          background: 'transparent', color: YLV2_Tokens.cream, cursor: 'pointer',
          fontFamily: YLV2_Type.mono, fontSize: 11,
        }}>{show ? (rtl ? 'הסתר' : 'Hide') : (rtl ? 'הצג' : 'Show')}</button>
      </div>
      <div style={{ display: 'flex', gap: 6 }}>
        <button onClick={save} style={{
          flex: 1, padding: '12px', borderRadius: 12, border: 'none',
          background: YLV2_Tokens.amber, color: YLV2_Tokens.ink, cursor: 'pointer',
          fontFamily: rtl ? YLV2_Type.hebSans : YLV2_Type.sans, fontSize: 12, fontWeight: 700,
        }}>{rtl ? 'שמור' : 'Save'}</button>
        <button onClick={test} disabled={!(draft || store.data.apiKey)} style={{
          flex: 1, padding: '12px', borderRadius: 12,
          background: 'transparent', border: `1px solid ${YLV2_Tokens.creamHair}`,
          color: YLV2_Tokens.cream, cursor: 'pointer',
          fontFamily: rtl ? YLV2_Type.hebSans : YLV2_Type.sans, fontSize: 12, fontWeight: 600,
          opacity: (draft || store.data.apiKey) ? 1 : 0.4,
        }}>{rtl ? 'בדוק חיבור' : 'Test connection'}</button>
      </div>
      {status && (
        <div style={{ padding: 10, borderRadius: 10, background: status.startsWith('✕') ? 'rgba(229,107,90,0.14)' : 'rgba(188,255,0,0.1)', color: status.startsWith('✕') ? '#F2B9AF' : YLV2_Tokens.amber, fontFamily: YLV2_Type.mono, fontSize: 11 }}>
          {status}
        </div>
      )}
      {hasKey && (
        <button onClick={() => { store.setApiKey(''); setDraft(''); }} style={{
          padding: '10px', borderRadius: 10, background: 'transparent',
          border: '1px solid rgba(229,107,90,0.3)', color: YLV2_Tokens.blood, cursor: 'pointer',
          fontFamily: YLV2_Type.mono, fontSize: 11,

function filterRecipes(recipes, dislikes) {
  const dis = new Set((dislikes || []).map(s => s.toLowerCase().trim()).filter(Boolean));
  return recipes.map(r => {
    const hits = r.ingredients.filter(ing => dis.has(ing.toLowerCase().trim()));
    if (hits.length === 0) return { ...r, ok: true, swaps: [] };
    const swappable = hits.filter(h => r.subs && r.subs[h]);
    if (swappable.length === hits.length) return { ...r, ok: true, swaps: swappable.map(h => ({ from: h, to: r.subs[h] })) };
    return { ...r, ok: false, blocked: hits };
  }).filter(r => r.ok);
}

/* ──────────────────────────────────────────────────────────────
   Claude API (client-side) — user supplies their own key
   ────────────────────────────────────────────────────────────── */
async function callClaude({ apiKey, messages, model = 'claude-haiku-4-5-20251001', maxTokens = 800 }) {
  if (!apiKey) throw new Error('NO_API_KEY');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      'content-type': 'application/json',
    },
    body: JSON.stringify({ model, max_tokens: maxTokens, messages }),
  });
  if (!res.ok) {
    const t = await res.text();
    throw new Error(`Claude ${res.status}: ${t.slice(0, 200)}`);
  }
  const j = await res.json();
  return j.content && j.content[0] && j.content[0].text || '';
}

async function fileToBase64(file) {
  const buf = await file.arrayBuffer();
  const bytes = new Uint8Array(buf);
  let binary = '';
  for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}

async function analyzeMealPhoto(apiKey, file) {
  const b64 = await fileToBase64(file);
  const mediaType = file.type && file.type.startsWith('image/') ? file.type : 'image/jpeg';
  const prompt = 'זהה מה זה ותן ערכים תזונתיים משוערים. החזר רק JSON בפורמט: {"name":"שם קצר בעברית","kcal":מספר,"protein":מספר,"slot":"breakfast|lunch|dinner|snack","notes":"הערה קצרה"} — בלי טקסט נוסף, בלי ```.';
  const raw = await callClaude({
    apiKey, maxTokens: 400,
    messages: [{
      role: 'user',
      content: [
        { type: 'image', source: { type: 'base64', media_type: mediaType, data: b64 } },
        { type: 'text', text: prompt },
      ],
    }],
  });
  return JSON.parse(raw.replace(/^```(?:json)?|```$/g, '').trim());
}

async function analyzeProductPhoto(apiKey, file, { dislikes = [], targetWeight } = {}) {
  const b64 = await fileToBase64(file);
  const mediaType = file.type && file.type.startsWith('image/') ? file.type : 'image/jpeg';

  const raw = await callClaude({

      role: 'user',

  const rtl = L.dir === 'rtl';
  const store = useStore();
  const [busy, setBusy] = React.useState(false);
  const [err, setErr] = React.useState('');
  const [preview, setPreview] = React.useState(null);
  const [parsed, setParsed] = React.useState(null);
  const fileRef = React.useRef(null);
  const apiKey = store.data.apiKey;
  const dislikes = store.data.dislikes || [];
  const targetWeight = store.data.profile && store.data.profile.targetWeight;

  const pickFile = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    setPreview(URL.createObjectURL(f));
    setParsed(null); setErr(''); setBusy(true);
    analyzeProductPhoto(apiKey, f, { dislikes, targetWeight })
      .then(r => { setParsed(r); setBusy(false); })
      .catch(e => { setErr(String(e.message || e)); setBusy(false); });
  };

  return (
    <Sheet L={L} title={rtl ? 'סריקת מוצר' : 'Product scan'} onClose={onClose}>
      {!apiKey && (
        <div style={{ padding: 14, borderRadius: 12, background: 'rgba(229,107,90,0.12)', border: '1px solid rgba(229,107,90,0.3)', marginBottom: 12, color: '#F2B9AF', fontSize: 13, lineHeight: 1.5 }}>
          {rtl ? 'צריך להזין מפתח Claude API בהגדרות.' : 'Set your Claude API key in Settings first.'}
        </div>
      )}
      <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={pickFile} style={{ display: 'none' }}/>
      <button onClick={() => apiKey && fileRef.current && fileRef.current.click()} disabled={!apiKey || busy} style={{
        ...primaryBtn(rtl), width: '100%', opacity: (!apiKey || busy) ? 0.5 : 1,
      }}>
        {busy ? (rtl ? 'מנתח...' : 'Analyzing...') : (rtl ? 'צלם אריזה / תווית' : 'Scan package / label')}
      </button>
      {preview && <img src={preview} alt="" style={{ width: '100%', borderRadius: 14, marginTop: 12, border: `1px solid ${YLV2_Tokens.creamHair}` }}/>}
      {err && <div style={{ marginTop: 10, padding: 10, borderRadius: 10, background: 'rgba(229,107,90,0.14)', color: '#F2B9AF', fontSize: 12 }}>{err}</div>}
      {parsed && (
        <div style={{ marginTop: 12, padding: 14, borderRadius: 14, background: parsed.recommended ? 'rgba(188,255,0,0.08)' : 'rgba(229,107,90,0.08)', border: `1px solid ${parsed.recommended ? 'rgba(188,255,0,0.28)' : 'rgba(229,107,90,0.28)'}` }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
            <div style={{ fontFamily: rtl ? YLV2_Type.heb : YLV2_Type.serif, fontSize: 18, color: YLV2_Tokens.cream }}>{parsed.name}</div>
            <div style={{ fontFamily: YLV2_Type.mono, fontSize: 10, fontWeight: 700, color: parsed.recommended ? YLV2_Tokens.amber : YLV2_Tokens.blood, letterSpacing: 1, textTransform: 'uppercase' }}>
              {parsed.recommended ? (rtl ? 'מתאים' : 'OK') : (rtl ? 'לא מתאים' : 'Skip')}
            </div>
          </div>
          <div style={{ fontFamily: YLV2_Type.mono, fontSize: 11, color: YLV2_Tokens.creamMute, marginTop: 6 }}>
            {parsed.kcal_per_100g} kcal / 100g · {parsed.protein_per_100g}g P / 100g
          </div>
          <div style={{ fontFamily: rtl ? YLV2_Type.hebSans : YLV2_Type.sans, fontSize: 13, color: YLV2_Tokens.cream, marginTop: 8, lineHeight: 1.4 }}>{parsed.why}</div>
          {parsed.better_alternative && !parsed.recommended && (
            <div style={{ marginTop: 8, padding: 10, borderRadius: 10, background: 'rgba(188,255,0,0.08)', border: '1px solid rgba(188,255,0,0.2)', fontFamily: rtl ? YLV2_Type.hebSans : YLV2_Type.sans, fontSize: 12, color: YLV2_Tokens.amber }}>
              {rtl ? 'במקום זה: ' : 'Instead: '}{parsed.better_alternative}
            </div>
          )}
        </div>
      )}
    </Sheet>
  );
}

/* ──────────────────────────────────────────────────────────────
   App shell — wires screens + overlays + language
   ────────────────────────────────────────────────────────────── */
function AppInner() {
  const store = useStore();
  const lang = store.data.lang || 'he';
  const setLang = (l) => store.setLang(l);
  const L = YLV2_STRINGS[lang];
  const t = L;

  const [tab, setTab] = React.useState('today');
  const mode = store.data.mode || 'workday';
  const setMode = (m) => store.setMode(m);
  const [overlay, setOverlay] = React.useState(null); // 'sos' | 'notifs' | 'modes' | 'settings' | 'weight' | 'meal' | 'workout' | null

  const stats = deriveStats(store.data);

  // Keep <html> dir/lang in sync so RTL is honored natively by the browser.
  // IMPORTANT: runs on every render order — must sit above the onboarding early-return.
  React.useEffect(() => {
    document.documentElement.setAttribute('dir', L.dir);
    document.documentElement.setAttribute('lang', lang);
  }, [lang, L.dir]);

  // Onboarding gate — show first-run flow until a profile exists
  if (!store.data.profile) {
    return <V2Onboarding L={L} onDone={() => {}}/>;
  }

  const openers = {
    openSOS:     () => setOverlay('sos'),
    openNotifs:  () => setOverlay('notifs'),
    openMode:    () => setOverlay('modes'),
    openWeight:  () => setOverlay('weight'),
    openMeal:    () => setOverlay('meal'),
    openWorkout: () => setOverlay('workout'),
    openPhotoMeal:  () => setOverlay('photoMeal'),
    openProductScan: () => setOverlay('productScan'),
  };

  const screen = (() => {
    switch (tab) {
      case 'today': return <V2Today t={t} L={L} stats={stats} store={store} mode={mode} {...openers}/>;
      case 'food':  return <V2Food  t={t} L={L} stats={stats} store={store} {...openers}/>;
      case 'train': return <V2Train t={t} L={L} stats={stats} store={store} {...openers}/>;
      case 'prog':  return <V2Progress t={t} L={L} stats={stats} store={store}/>;
      case 'ai':    return <V2AI t={t} L={L} stats={stats}/>;
      default: return null;
    }
  })();

  const rtl = L.dir === 'rtl';

  return (
    <div style={{
      position: 'relative', minHeight: '100dvh',
      background: YLV2_Tokens.ink, color: YLV2_Tokens.cream,
      direction: L.dir, overflow: 'hidden',
    }}>
      {/* Floating controls pill — settings + language, always accessible */}
      <div style={{
        position: 'fixed', zIndex: 50,
        top: 'calc(env(safe-area-inset-top) + 10px)',
        [rtl ? 'left' : 'right']: 12,
        display: 'flex', gap: 6, direction: 'ltr',
      }}>
        <button onClick={() => setOverlay('settings')} aria-label="Settings" style={{
          width: 36, height: 36, borderRadius: 18,
          background: 'rgba(17,38,38,0.72)',
          backdropFilter: 'blur(14px) saturate(180%)',
          WebkitBackdropFilter: 'blur(14px) saturate(180%)',
          border: `1px solid rgba(233,235,230,0.16)`,
          color: YLV2_Tokens.cream, cursor: 'pointer',
          display: 'grid', placeItems: 'center',
        }}>
          <V2Icon name="cog" size={16}/>
        </button>
        <button onClick={() => setLang(lang === 'he' ? 'en' : 'he')} aria-label="Language" style={{
          minWidth: 40, height: 36, borderRadius: 18,
          padding: '0 12px',
          background: 'rgba(188,255,0,0.14)', color: YLV2_Tokens.amber,
          backdropFilter: 'blur(14px) saturate(180%)',
          WebkitBackdropFilter: 'blur(14px) saturate(180%)',
          border: `1px solid ${YLV2_Tokens.amber}`, cursor: 'pointer',
          fontFamily: YLV2_Type.mono, fontSize: 10, fontWeight: 700, letterSpacing: 1.2,
        }}>{lang === 'he' ? 'EN' : 'עב'}</button>
      </div>

      {/* Active screen */}
      {screen}

      {/* Floating bottom tab bar */}
      <V2TabBar tab={tab} setTab={setTab} t={t} L={L}/>

      {/* Overlays */}
      {overlay === 'sos'      && <V2SOS t={t} L={L} close={() => setOverlay(null)}/>}
      {overlay === 'notifs'   && <V2Notifications t={t} L={L} close={() => setOverlay(null)}/>}
      {overlay === 'modes'    && <V2ModePicker t={t} L={L} active={mode} setActive={setMode} onClose={() => setOverlay(null)}/>}
      {overlay === 'settings' && <V2Settings t={t} L={L} lang={lang} setLang={setLang} mode={mode} setMode={setMode} store={store} close={() => setOverlay(null)}/>}
      {overlay === 'weight'     && <WeightSheet L={L} onClose={() => setOverlay(null)}/>}
      {overlay === 'meal'       && <MealSheet L={L} onClose={() => setOverlay(null)}/>}
      {overlay === 'workout'    && <WorkoutSheet L={L} onClose={() => setOverlay(null)}/>}
      {overlay === 'photoMeal'  && <PhotoMealSheet L={L} onClose={() => setOverlay(null)}/>}
      {overlay === 'productScan'&& <ProductScanSheet L={L} onClose={() => setOverlay(null)}/>}
    </div>
  );
}

function App() {
  return <StoreProvider><AppInner/></StoreProvider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
